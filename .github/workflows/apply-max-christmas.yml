name: Apply maximum Christmas styling

on:
  push:
    branches:
      - design/max-christmas-magic

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply festive visual pass
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          marker = 'MAX-CHRISTMAS-PASS-2026'
          if marker in html:
              raise SystemExit('Festive pass already applied')

          festive_css = r'''

    /* MAX-CHRISTMAS-PASS-2026: intentionally bold holiday presentation */
    body {
      background:
        radial-gradient(circle at 9% 8%, rgba(255, 55, 78, .30), transparent 25rem),
        radial-gradient(circle at 92% 4%, rgba(255, 207, 92, .25), transparent 23rem),
        radial-gradient(circle at 50% 105%, rgba(94, 190, 147, .22), transparent 34rem),
        linear-gradient(150deg, #041c14 0%, var(--evergreen-950) 33%, #123f2f 67%, #071f18 100%);
    }

    body::before {
      opacity: .62;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.95) 0 1.5px, transparent 2px),
        radial-gradient(circle, rgba(255,255,255,.72) 0 1px, transparent 1.8px),
        radial-gradient(circle, rgba(255,255,255,.48) 0 2px, transparent 2.6px);
      background-position: 0 0, 23px 31px, 51px 13px;
      background-size: 54px 54px, 76px 76px, 108px 108px;
      animation: snow-drift 20s linear infinite;
    }

    body::after {
      content: "";
      position: fixed;
      inset: auto 0 0;
      height: 72px;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(80px 34px at 6% 100%, rgba(255,255,255,.22) 0 98%, transparent 100%),
        radial-gradient(110px 42px at 25% 100%, rgba(255,255,255,.18) 0 98%, transparent 100%),
        radial-gradient(96px 38px at 49% 100%, rgba(255,255,255,.20) 0 98%, transparent 100%),
        radial-gradient(126px 46px at 75% 100%, rgba(255,255,255,.17) 0 98%, transparent 100%),
        radial-gradient(86px 34px at 95% 100%, rgba(255,255,255,.22) 0 98%, transparent 100%);
    }

    @keyframes snow-drift {
      to { background-position: 54px 108px, -53px 107px, 159px 121px; }
    }

    @keyframes twinkle {
      0%, 100% { filter: drop-shadow(0 0 5px currentColor); transform: translateY(0) scale(.96); }
      50% { filter: drop-shadow(0 0 13px currentColor); transform: translateY(2px) scale(1.08); }
    }

    @keyframes ornament-sway {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    @keyframes christmas-glow {
      0%, 100% { box-shadow: 0 16px 46px rgba(0,0,0,.26), 0 0 0 rgba(241,213,138,0); }
      50% { box-shadow: 0 18px 54px rgba(0,0,0,.30), 0 0 28px rgba(241,213,138,.22); }
    }

    .app-shell { position: relative; }

    .north-pole-banner {
      width: fit-content;
      max-width: calc(100% - 24px);
      margin: 0 auto 12px;
      padding: 7px 20px 8px;
      color: #fff9e8;
      text-align: center;
      font: 900 .78rem/1.1 Georgia, "Times New Roman", serif;
      letter-spacing: .13em;
      text-transform: uppercase;
      border: 2px solid rgba(255,255,255,.72);
      border-radius: 999px;
      background:
        repeating-linear-gradient(135deg, #b51f35 0 11px, #d93a50 11px 22px, #fff8e8 22px 27px, #176247 27px 38px, #0e4936 38px 49px, #fff8e8 49px 54px);
      box-shadow: 0 8px 24px rgba(0,0,0,.24), inset 0 0 0 2px rgba(8,38,29,.18);
      text-shadow: 0 2px 5px rgba(0,0,0,.55);
    }

    .light-string {
      height: 46px;
      margin: -4px 6px 8px;
      border-top: 0;
      border-radius: 999px 999px 45% 45%;
      background:
        radial-gradient(ellipse at 50% 0, #2d7a55 0 28%, transparent 29%),
        repeating-linear-gradient(165deg, transparent 0 16px, rgba(47,135,89,.98) 17px 24px, rgba(10,74,48,.95) 25px 33px, transparent 34px 47px);
      filter: drop-shadow(0 8px 10px rgba(0,0,0,.28));
      overflow: visible;
    }

    .light-string::before {
      content: "";
      position: absolute;
      left: 2%;
      right: 2%;
      top: 7px;
      height: 5px;
      border-radius: 50%;
      background: #163e2d;
      box-shadow: 0 3px 0 rgba(255,255,255,.06);
    }

    .bulb {
      position: absolute;
      top: 13px;
      width: 13px;
      height: 18px;
      border-radius: 50% 50% 45% 45%;
      color: #f7d65e;
      background: currentColor;
      box-shadow: inset 0 2px 2px rgba(255,255,255,.62);
      animation: twinkle 1.8s ease-in-out infinite;
    }

    .bulb::before {
      content: "";
      position: absolute;
      left: 3px;
      top: -5px;
      width: 7px;
      height: 6px;
      border-radius: 2px;
      background: #293c33;
    }

    .bulb:nth-child(1) { left: 6%; color: #ffd45c; animation-delay: -.4s; }
    .bulb:nth-child(2) { left: 18%; color: #ef4560; animation-delay: -1.1s; }
    .bulb:nth-child(3) { left: 31%; color: #8ae2ba; animation-delay: -.7s; }
    .bulb:nth-child(4) { left: 44%; color: #ffd45c; animation-delay: -1.5s; }
    .bulb:nth-child(5) { left: 57%; color: #ef4560; animation-delay: -.2s; }
    .bulb:nth-child(6) { left: 70%; color: #8ae2ba; animation-delay: -1.3s; }
    .bulb:nth-child(7) { left: 83%; color: #ffd45c; animation-delay: -.8s; }
    .bulb:nth-child(8) { left: 94%; color: #ef4560; animation-delay: -1.7s; }

    .hero {
      min-height: 248px;
      padding: 30px 34px;
      border: 5px solid transparent;
      border-radius: 34px;
      background:
        radial-gradient(circle at 82% 18%, rgba(255,232,158,.24), transparent 15rem) padding-box,
        radial-gradient(circle at 21% 110%, rgba(255,255,255,.20), transparent 20rem) padding-box,
        linear-gradient(122deg, #9c172b 0%, #c82740 39%, #155d43 72%, #0b3b2c 100%) padding-box,
        repeating-linear-gradient(135deg, #d82d48 0 12px, #fff8e8 12px 24px, #176247 24px 36px, #fff8e8 36px 48px) border-box;
      box-shadow: 0 24px 68px rgba(0,0,0,.34), inset 0 0 0 2px rgba(255,255,255,.16);
      animation: christmas-glow 4.5s ease-in-out infinite;
    }

    .hero::before {
      content: "";
      position: absolute;
      left: -4%;
      right: -4%;
      bottom: -47px;
      height: 110px;
      background:
        radial-gradient(95px 45px at 8% 12%, rgba(255,255,255,.94) 0 98%, transparent 100%),
        radial-gradient(130px 54px at 31% 6%, rgba(255,255,255,.91) 0 98%, transparent 100%),
        radial-gradient(115px 50px at 56% 16%, rgba(255,255,255,.95) 0 98%, transparent 100%),
        radial-gradient(148px 60px at 82% 5%, rgba(255,255,255,.90) 0 98%, transparent 100%);
      opacity: .26;
      pointer-events: none;
    }

    .hero::after {
      content: "❄";
      right: 33%;
      top: -54px;
      color: rgba(255,255,255,.11);
      font-size: 250px;
    }

    .hero-copy-wrap { position: relative; z-index: 2; }

    .hero-ornaments {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      pointer-events: none;
      z-index: 3;
    }

    .hero-ornament {
      position: absolute;
      top: -8px;
      width: 3px;
      height: 36px;
      background: rgba(255,240,185,.72);
      transform-origin: top;
      animation: ornament-sway 3.7s ease-in-out infinite;
    }

    .hero-ornament::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 31px;
      width: 25px;
      height: 25px;
      border: 3px solid rgba(255,255,255,.52);
      border-radius: 50%;
      transform: translateX(-50%);
      background: #f2c954;
      box-shadow: 0 0 16px rgba(255,221,99,.62), inset 0 3px 5px rgba(255,255,255,.48);
    }

    .hero-ornament:nth-child(1) { left: 17%; animation-delay: -.8s; }
    .hero-ornament:nth-child(1)::after { background: #f2c954; }
    .hero-ornament:nth-child(2) { left: 53%; height: 27px; animation-delay: -1.7s; }
    .hero-ornament:nth-child(2)::after { top: 22px; background: #5ec59a; }
    .hero-ornament:nth-child(3) { left: 72%; height: 43px; animation-delay: -.2s; }
    .hero-ornament:nth-child(3)::after { top: 38px; background: #ef4560; }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
      padding: 5px 11px;
      color: #fff6cf;
      border: 1px solid rgba(255,255,255,.32);
      border-radius: 999px;
      background: rgba(6,45,31,.38);
      text-shadow: 0 2px 5px rgba(0,0,0,.32);
    }

    .hero h1 {
      display: grid;
      gap: 2px;
      max-width: 760px;
      text-shadow: 0 4px 0 rgba(85,10,24,.30), 0 8px 22px rgba(0,0,0,.30);
    }

    .merry-title {
      display: block;
      color: #fffdf6;
      font-size: clamp(2.55rem, 5.2vw, 5rem);
      line-height: .88;
      letter-spacing: -.045em;
    }

    .nice-list-title {
      display: block;
      width: fit-content;
      margin-top: 9px;
      padding: 7px 14px 8px;
      color: #173d2e;
      font: 900 clamp(1rem, 2vw, 1.45rem)/1 Georgia, "Times New Roman", serif;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 9px;
      background: linear-gradient(180deg, #fffbe9, #f1d58a);
      box-shadow: 0 7px 18px rgba(0,0,0,.24), inset 0 0 0 2px rgba(255,255,255,.52);
      text-shadow: none;
      transform: rotate(-1deg);
    }

    .hero-copy {
      max-width: 690px;
      color: rgba(255,255,255,.94);
      font-size: 1.04rem;
      font-weight: 650;
      text-shadow: 0 2px 7px rgba(0,0,0,.30);
    }

    .hero-scene {
      position: relative;
      z-index: 2;
      width: 220px;
      min-height: 178px;
      align-self: end;
      filter: drop-shadow(0 13px 18px rgba(0,0,0,.30));
    }

    .hero-moon {
      position: absolute;
      right: 18px;
      top: 0;
      width: 84px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #8f1d2c;
      background: radial-gradient(circle at 36% 30%, #fffef3, #f5dc96 66%, #d9a441 100%);
      box-shadow: 0 0 28px rgba(255,231,157,.54);
      font-size: 2.5rem;
    }

    .hero-tree {
      position: absolute;
      left: 3px;
      bottom: 0;
      font-size: 7.4rem;
      line-height: 1;
      transform: rotate(-2deg);
      filter: drop-shadow(0 0 10px rgba(255,217,98,.30));
    }

    .hero-gifts {
      position: absolute;
      right: 0;
      bottom: 0;
      font-size: 3.4rem;
      line-height: 1;
      transform: rotate(3deg);
    }

    .hero-sparkles {
      position: absolute;
      right: 55px;
      bottom: 56px;
      color: #fff2b3;
      font-size: 2rem;
      text-shadow: 0 0 12px #ffd45c;
    }

    .meta-chip {
      border-color: rgba(255,255,255,.34);
      background: rgba(5,43,30,.54);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), 0 5px 14px rgba(0,0,0,.16);
    }

    .card {
      border-width: 4px;
      border-color: transparent;
      background:
        radial-gradient(circle at 100% 0, rgba(217,164,65,.14), transparent 12rem) padding-box,
        linear-gradient(180deg, #fffef9, #fff9e9) padding-box,
        repeating-linear-gradient(135deg, #cf334a 0 10px, #fffdf7 10px 20px, #176247 20px 30px, #fffdf7 30px 40px) border-box;
      box-shadow: 0 20px 48px rgba(2,22,15,.22), inset 0 0 0 1px rgba(217,164,65,.15);
    }

    .card::before {
      content: "✦";
      position: absolute;
      right: 13px;
      top: 8px;
      z-index: 1;
      color: rgba(217,164,65,.42);
      font-size: 1.45rem;
      text-shadow: -22px 16px 0 rgba(207,51,74,.12);
      pointer-events: none;
    }

    .card-header {
      position: relative;
      padding-bottom: 12px;
      border-bottom: 2px dashed rgba(179,38,59,.17);
    }

    .card-header::after {
      content: "🎄";
      position: absolute;
      right: 0;
      bottom: -13px;
      padding: 0 5px;
      background: #fffbed;
      font-size: 1rem;
    }

    .section-kicker { color: var(--berry-700); }

    .step-badge,
    .count-orb {
      position: relative;
      border: 3px solid rgba(255,255,255,.72);
      background: radial-gradient(circle at 33% 25%, #ef5268, var(--berry-700) 58%, #7d1323);
      box-shadow: 0 8px 19px rgba(143,29,44,.30), inset 0 3px 5px rgba(255,255,255,.28);
    }

    .step-badge::before,
    .count-orb::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -9px;
      width: 13px;
      height: 8px;
      border: 2px solid #b78830;
      border-bottom: 0;
      border-radius: 7px 7px 0 0;
      transform: translateX(-50%);
    }

    input[type="text"] {
      border-color: rgba(23,98,71,.30);
      background:
        radial-gradient(circle at 97% 19%, rgba(207,51,74,.07) 0 3px, transparent 4px),
        radial-gradient(circle at 94% 62%, rgba(23,98,71,.07) 0 3px, transparent 4px),
        #fff;
      box-shadow: inset 0 0 0 1px rgba(217,164,65,.10), 0 4px 12px rgba(8,38,29,.05);
    }

    .button-primary {
      border: 2px solid rgba(255,255,255,.58);
      background: linear-gradient(110deg, #9f172c, #df3550 49%, #ad1f36);
      box-shadow: 0 10px 22px rgba(143,29,44,.30), inset 0 2px 0 rgba(255,255,255,.22);
      text-shadow: 0 2px 4px rgba(0,0,0,.22);
    }

    .button-secondary {
      border: 2px solid rgba(255,255,255,.58);
      background: linear-gradient(110deg, #0a3d2c, #197653 55%, #0d4a35);
      box-shadow: 0 10px 22px rgba(18,75,57,.25), inset 0 2px 0 rgba(255,255,255,.18);
      text-shadow: 0 2px 4px rgba(0,0,0,.20);
    }

    .action-tile {
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(179,38,59,.18);
      background:
        linear-gradient(90deg, transparent 46%, rgba(207,51,74,.10) 46% 54%, transparent 54%),
        linear-gradient(0deg, transparent 42%, rgba(23,98,71,.09) 42% 52%, transparent 52%),
        linear-gradient(180deg, #fff, #fff4d9);
      box-shadow: 0 7px 16px rgba(8,38,29,.08), inset 0 0 0 1px rgba(255,255,255,.8);
      transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease;
    }

    .action-tile::before {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      width: 28px;
      height: 18px;
      border: 6px solid rgba(207,51,74,.24);
      border-bottom: 0;
      border-radius: 50% 50% 0 0;
      transform: translateX(-50%);
    }

    .action-tile:hover {
      transform: translateY(-3px) rotate(-.35deg);
      border-color: rgba(179,38,59,.36);
      box-shadow: 0 12px 24px rgba(8,38,29,.14);
    }

    .success-panel {
      border: 2px solid rgba(23,98,71,.28);
      background:
        radial-gradient(circle at 96% 6%, rgba(255,255,255,.78) 0 2px, transparent 3px),
        linear-gradient(120deg, rgba(23,98,71,.11), rgba(217,164,65,.17));
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.46);
    }

    .preview-row,
    .party-row,
    .detail-item,
    .group-card,
    .choice-card {
      box-shadow: 0 4px 12px rgba(8,38,29,.055);
    }

    dialog {
      border: 4px solid transparent;
      background:
        linear-gradient(var(--cream-50), var(--cream-50)) padding-box,
        repeating-linear-gradient(135deg, #cf334a 0 10px, #fffdf7 10px 20px, #176247 20px 30px, #fffdf7 30px 40px) border-box;
    }

    .dialog-header {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 88% 20%, rgba(241,213,138,.22), transparent 10rem),
        linear-gradient(110deg, #092f23, #176247 60%, #9d1c30 140%);
    }

    .dialog-header::after {
      content: "❄  ✦  ❄";
      position: absolute;
      right: 74px;
      top: 50%;
      color: rgba(255,255,255,.20);
      transform: translateY(-50%);
      letter-spacing: .28em;
      font-size: 1.2rem;
    }

    .mobile-nav {
      border-top: 3px solid rgba(241,213,138,.85);
      background:
        radial-gradient(circle at 50% -20%, rgba(207,51,74,.42), transparent 9rem),
        rgba(5,38,27,.96);
    }

    .nav-button.active {
      color: #fff6c8;
      background: linear-gradient(145deg, rgba(207,51,74,.45), rgba(255,255,255,.10));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .christmas-footer {
      margin: 18px auto 0;
      padding: 12px 18px;
      color: rgba(255,255,255,.84);
      text-align: center;
      font: 700 .86rem/1.35 Georgia, "Times New Roman", serif;
      letter-spacing: .04em;
      text-shadow: 0 2px 5px rgba(0,0,0,.30);
    }

    .christmas-footer strong { color: #ffe59a; }
          '''

          mobile_css = r'''

      .north-pole-banner {
        margin-bottom: 7px;
        padding: 6px 13px 7px;
        font-size: .66rem;
        letter-spacing: .09em;
      }

      .light-string {
        height: 35px;
        margin-top: -3px;
      }

      .bulb { top: 9px; width: 10px; height: 14px; }

      .hero {
        min-height: 0;
        padding: 23px 18px 20px;
        border-width: 4px;
      }

      .hero-ornament:nth-child(2),
      .hero-ornament:nth-child(3) { display: none; }
      .hero-ornament:nth-child(1) { left: auto; right: 21px; }

      .merry-title {
        max-width: 290px;
        font-size: clamp(2.35rem, 12vw, 3.2rem);
      }

      .nice-list-title {
        margin-top: 8px;
        font-size: .9rem;
      }

      .hero-copy { max-width: calc(100% - 74px); }

      .hero-scene {
        display: block;
        position: absolute;
        right: 7px;
        bottom: 8px;
        width: 78px;
        min-height: 92px;
        opacity: .92;
      }

      .hero-moon {
        right: 2px;
        top: 0;
        width: 43px;
        font-size: 1.25rem;
      }

      .hero-tree { left: -5px; font-size: 4rem; }
      .hero-gifts { right: -3px; font-size: 1.8rem; }
      .hero-sparkles { display: none; }

      .card { border-width: 3px; }
      .card-header::after { right: 4px; }
      .christmas-footer { margin-top: 8px; padding-bottom: 0; font-size: .78rem; }
          '''

          if '    @media (max-width: 900px) {' not in html:
              raise SystemExit('Expected desktop/mobile breakpoint not found')
          html = html.replace(
              '    @media (max-width: 900px) {',
              festive_css + '\n\n    @media (max-width: 900px) {' + mobile_css,
              1
          )

          body_open = '<body onload="init()">'
          body_insert = '''<body onload="init()">
  <div class="north-pole-banner" aria-hidden="true">✦ Special delivery from the North Pole ✦</div>'''
          if body_open not in html:
              raise SystemExit('Body opening marker not found')
          html = html.replace(body_open, body_insert, 1)

          old_lights = '<div class="light-string" aria-hidden="true"></div>'
          new_lights = '''<div class="light-string" aria-hidden="true">
      <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
      <span class="bulb"></span><span class="bulb"></span><span class="bulb"></span><span class="bulb"></span>
    </div>'''
          if old_lights not in html:
              raise SystemExit('Light-string marker not found')
          html = html.replace(old_lights, new_lights, 1)

          old_hero = '''<header class="hero">
      <div>
        <p class="eyebrow">Barrios Family Christmas</p>
        <h1>Santa’s Nice List</h1>
        <p class="hero-copy">RSVP in one step. Add guests and claim dishes only when you need to—no account, no ads, no long form.</p>
        <div class="meta-bar" id="metaBar" aria-label="Event details"></div>
      </div>
      <div class="wreath" aria-hidden="true">🎁</div>
    </header>'''
          new_hero = '''<header class="hero">
      <div class="hero-ornaments" aria-hidden="true"><span class="hero-ornament"></span><span class="hero-ornament"></span><span class="hero-ornament"></span></div>
      <div class="hero-copy-wrap">
        <p class="eyebrow">🎄 Barrios Family Christmas 2025 🎄</p>
        <h1><span class="merry-title">Merry Christmas!</span><span class="nice-list-title">Santa’s Nice List</span></h1>
        <p class="hero-copy">Join the family celebration, add your guests, and choose a holiday dish—all wrapped up in one quick RSVP.</p>
        <div class="meta-bar" id="metaBar" aria-label="Event details"></div>
      </div>
      <div class="hero-scene" aria-hidden="true">
        <div class="hero-moon">🎅</div>
        <div class="hero-tree">🎄</div>
        <div class="hero-gifts">🎁</div>
        <div class="hero-sparkles">✨</div>
      </div>
    </header>'''
          if old_hero not in html:
              raise SystemExit('Hero block marker not found')
          html = html.replace(old_hero, new_hero, 1)

          shell_close = '''    </main>
  </div>'''
          shell_new = '''    </main>
    <footer class="christmas-footer">❄️ Made with <strong>family, food, gifts, and Christmas cheer</strong> ❄️</footer>
  </div>'''
          if shell_close not in html:
              raise SystemExit('App-shell closing marker not found')
          html = html.replace(shell_close, shell_new, 1)

          path.write_text(html, encoding='utf-8')
          Path('docs/index.html').write_text(html, encoding='utf-8')

          if path.read_text(encoding='utf-8') != Path('docs/index.html').read_text(encoding='utf-8'):
              raise SystemExit('Root/docs files are not identical')

          script = re.search(r'<script>(.*?)</script>', html, flags=re.S)
          if not script:
              raise SystemExit('JavaScript block not found')
          Path('/tmp/christmas.js').write_text(script.group(1), encoding='utf-8')
          PY

          node --check /tmp/christmas.js
          cmp --silent index.html docs/index.html

      - name: Commit festive pass
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/apply-max-christmas.yml
          git add index.html docs/index.html .github/workflows/apply-max-christmas.yml
          git commit -m "Make Christmas 2025 dramatically more festive"
          git push
