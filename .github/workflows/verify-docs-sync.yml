name: Verify docs/index.html matches Index.html

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure docs/index.html is synced
        run: |
          if ! cmp --silent Index.html docs/index.html; then
            echo "docs/index.html is out of sync with Index.html. Run ./scripts/sync-docs.sh." >&2
            exit 1
          fi
